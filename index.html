<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HackTech Elite V4.0</title>
    <style>
        :root {
            --bg: #0b0e14; --card: #161b22; --accent: #00ff41;
            --text: #f0f6fc; --text-dim: #8b949e; --danger: #ff4444; --warning: #ffbb33;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 12px; text-align: center; border-bottom: 1px solid #30363d; background: var(--card); }
        header h1 { margin: 0; font-size: 1rem; color: var(--accent); letter-spacing: 2px; }
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 8px; margin-bottom: 12px; }
        label { display: block; color: var(--text-dim); font-size: 0.7rem; margin-bottom: 4px; }
        input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 0.9rem; }
        .res-box { text-align: center; padding: 12px; background: rgba(0, 255, 65, 0.05); border-radius: 10px; border: 1px solid rgba(0,255,65,0.2); }
        .val { font-size: 1.6rem; font-weight: bold; color: var(--accent); display: block; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; border-top: 1px solid #30363d; height: 65px; }
        .nav-btn { flex: 1; border: none; background: none; color: var(--text-dim); font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent); background: rgba(0,255,65,0.05); }
        .lens-sim { height: 40px; background: #000; border-radius: 8px; position: relative; overflow: hidden; margin-top: 10px; }
        .angle-cone { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 40px solid rgba(0, 255, 65, 0.3); }
    </style>
</head>
<body>

<header><h1>HACKTECH ELITE V4.0</h1></header>

<div class="content">
    <div id="tab_hdd" class="tab-content active">
        <div class="card">
            <h3>Almacenamiento</h3>
            <div class="grid-2">
                <div><label>Cámaras</label><input type="number" id="h_qty" value="7" oninput="runAll()"></div>
                <div><label>Días</label><input type="number" id="h_day" value="15" oninput="runAll()"></div>
            </div>
            <div class="grid-2">
                <div><label>Grabación</label><select id="h_type" onchange="runAll()"><option value="1">24/7 (Cont.)</option><option value="0.4">Movimiento</option></select></div>
                <div><label>FPS</label><select id="h_fps" onchange="runAll()"><option value="1">15 FPS</option><option value="1.8">30 FPS</option></select></div>
            </div>
            <label>Calidad / Códec</label>
            <div class="grid-2">
                <select id="h_res" onchange="runAll()"><option value="2048">2MP</option><option value="4096" selected>4MP</option></select>
                <select id="h_cod" onchange="runAll()"><option value="0.5">H.265+</option><option value="1">H.264</option></select>
            </div>
            <div class="res-box"><span class="val" id="out_h">0.00</span><small>TERABYTES</small></div>
        </div>
    </div>

    <div id="tab_volt" class="tab-content">
        <div class="card">
            <h3>Cálculo de Voltaje</h3>
            <div class="grid-2">
                <div><label>V. Fuente</label><input type="number" id="v_in" value="12.0" step="0.1" oninput="runAll()"></div>
                <div><label>Metros</label><input type="number" id="v_mt" value="15" oninput="runAll()"></div>
            </div>
            <div class="grid-2">
                <div><label>Watts Cámara</label><input type="number" id="v_watt" value="7" oninput="runAll()"></div>
                <div>
                    <label>Pares UTP (Uso)</label>
                    <select id="v_hilos" onchange="runAll()">
                        <option value="1">1 par (2 hilos: 1+ y 1-)</option>
                        <option value="2">2 pares (4 hilos: 2+ y 2-)</option>
                        <option value="3">3 pares (6 hilos: 3+ y 3-)</option>
                    </select>
                </div>
            </div>
            <label>Material de Cable</label>
            <select id="v_mat" onchange="runAll()">
                <option value="0.0172">100% Cobre</option>
                <option value="0.0267" selected>CCA (Económico)</option>
            </select>
            <div class="res-box">
                <span class="val" id="out_v">0.00V</span>
                <small id="out_vm" style="font-weight:bold;"></small>
            </div>
        </div>
    </div>

    <div id="tab_tools" class="tab-content">
        <div class="card">
            <h3>Simulador de Lente</h3>
            <select id="t_lens" onchange="updateLens()">
                <option value="103">2.8 mm (103°)</option>
                <option value="82" selected>3.6 mm (82°)</option>
                <option value="54">6.0 mm (54°)</option>
            </select>
            <div class="lens-sim"><div id="lens_cone" class="angle-cone"></div></div>
        </div>
        <div class="card">
            <h3>Internet Requerido</h3>
            <div class="res-box"><span class="val" id="out_net">0.0</span><small>Mbps UPLOAD</small></div>
        </div>
    </div>

    <div id="tab_red" class="tab-content">
        <div class="card">
            <h3>Subred & Errores</h3>
            <select id="n_cidr" onchange="runNet()">
                <option value="25">/25 (126 IPs)</option>
                <option value="24">/24 (254 IPs)</option>
            </select>
            <div style="font-size:0.75rem; margin-bottom:10px;">
                Mask: <b id="n_mask" style="color:var(--accent)"></b><br>
                Broad: <b id="n_broad" style="color:var(--danger)"></b>
            </div>
            <div style="border-top:1px solid #333; padding-top:10px;">
                <label>Beeps (Pitidos):</label>
                <small>1 Largo: HDD | 2 Cortos: Red | Cont: Video</small>
            </div>
        </div>
    </div>
</div>

<nav>
    <button class="nav-btn active" onclick="tab('tab_hdd', this)"><span>💾</span>HDD</button>
    <button class="nav-btn" onclick="tab('tab_volt', this)"><span>⚡</span>VOLT</button>
    <button class="nav-btn" onclick="tab('tab_tools', this)"><span>🛠️</span>TOOLS</button>
    <button class="nav-btn" onclick="tab('tab_red', this)"><span>🌐</span>RED</button>
</nav>

<script>
    function tab(id, b) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
    }
    function updateLens() {
        const a = document.getElementById('t_lens').value;
        document.getElementById('lens_cone').style.borderLeftWidth = (a/4)+"px";
        document.getElementById('lens_cone').style.borderRightWidth = (a/4)+"px";
    }
    function runNet() {
        const c = document.getElementById('n_cidr').value;
        document.getElementById('n_mask').innerText = c == "24" ? "255.255.255.0" : "255.255.255.128";
        document.getElementById('n_broad').innerText = c == "24" ? ".255" : ".127";
    }
    function runAll() {
        // HDD
        const q = document.getElementById('h_qty').value || 0;
        const d = document.getElementById('h_day').value || 0;
        const res = document.getElementById('h_res').value;
        const cod = document.getElementById('h_cod').value;
        const fps = document.getElementById('h_fps').value;
        const type = document.getElementById('h_type').value;
        let storage = (res * cod * fps * type * 86400 * d * q) / 8589934592;
        document.getElementById('out_h').innerText = storage.toFixed(2);
        document.getElementById('out_net').innerText = ((res * cod * q * 0.7 * fps) / 1024).toFixed(1);

        // VOLT (Cálculo por hilos de 24AWG)
        const vIn = parseFloat(document.getElementById('v_in').value) || 12;
        const mt = document.getElementById('v_mt').value || 0;
        const w = document.getElementById('v_watt').value || 0;
        const hilos = document.getElementById('v_hilos').value;
        const mat = document.getElementById('v_mat').value;
        const amp = w / 12; 
        const area = 0.20 * hilos; // Area del calibre 24AWG multiplicada por hilos (pares)
        let vf = vIn - ((2 * mt * amp * mat) / area);
        
        const o = document.getElementById('out_v'); const om = document.getElementById('out_vm');
        o.innerText = vf.toFixed(2) + "V";
        if(vf < 10.8) { o.style.color = 'var(--danger)'; om.innerText = "SISTEMA CAÍDO"; }
        else { o.style.color = 'var(--accent)'; om.innerText = "VOLTAJE ÓPTIMO"; }
    }
    window.onload = () => { runAll(); runNet(); updateLens(); };
</script>
</body>
</html>
